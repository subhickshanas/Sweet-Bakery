<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            <p class="subtitle">Get a random joke to brighten your day!</p>
            
            <div class="joke-display">
                <p id="jokeText" class="joke-text">Click the button to generate a joke...</p>
                <p id="jokeType" class="joke-type"></p>
            </div>

            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary">Get a Joke</button>
                <button id="nextJokeBtn" class="btn btn-secondary">Next Joke</button>
                <button id="copyBtn" class="btn btn-copy">📋 Copy</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="joke-history">
                <h3>Recent Jokes:</h3>
                <ul id="jokeHistory"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
